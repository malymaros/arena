<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Arena background layers -->
  <div id="arena" class="arena"></div>

    <!-- Stred: kolo -->
    <div class="hud-turn" id="hud-turn"></div>
    <!-- Indikácia čakania na ťah — kto je locknutý a na koho sa čaká -->
    <div id="turn-status" class="turn-status hidden"></div>

    <!-- Vľavo: P1 -->
    <div class="hud hud-box hud-p1" id="hud-p1">
      <span class="starter-flag" id="flag-p1" title="Starts this round">⚑</span>
      <canvas class="hud-char" id="hud-char-p1" width="160" height="160"></canvas>
      <div class="hud-stats">
        <div class="hud-stat">
          <span class="bar-label" title="HP">❤️<span class="bar-num hp-num">–</span></span>
          <div class="bar hp-bar" id="p1-hp"></div>
        </div>
        <div class="hud-stat">
          <span class="bar-label" title="Mana">💧<span class="bar-num mana-num">–</span></span>
          <div class="bar mana-bar" id="p1-mana"></div>
        </div>
      </div>
      <div class="action-log" id="log-p1"></div>
    </div>

    <!-- Vpravo: P2 -->
    <div class="hud hud-box hud-p2" id="hud-p2">
      <span class="starter-flag" id="flag-p2" title="Starts this round">⚑</span>
      <canvas class="hud-char" id="hud-char-p2" width="160" height="160"></canvas>
      <div class="hud-stats">
        <div class="hud-stat">
          <span class="bar-label" title="HP">❤️<span class="bar-num hp-num">–</span></span>
          <div class="bar hp-bar" id="p2-hp"></div>
        </div>
        <div class="hud-stat">
          <span class="bar-label" title="Mana">💧<span class="bar-num mana-num">–</span></span>
          <div class="bar mana-bar" id="p2-mana"></div>
        </div>
      </div>
      <div class="action-log" id="log-p2"></div>
    </div>

  <main class="stage">
    <section class="game">
      <div class="board">
        <!-- effects/grid -->
        <div id="grid" class="grid"></div>
        <!-- actors -->
        <div id="actors" class="actors">
          <canvas id="actor-p1" class="sprite-actor" width="224" height="224"></canvas>
          <canvas id="actor-p2" class="sprite-actor" width="224" height="224"></canvas>
        </div>
      </div>

      <div class="panel">
        <div id="queue" class="queue"></div>
      </div>
    </section>
  </main>

  <!-- Controls toolbar -->
  <div class="controls-row">
    <!-- Golden Shield — samostatné tlačidlo naľavo od panela, len pre hráča, ktorý v kole nezačína -->
    <button id="golden-btn" class="btn act golden hidden" title="Golden Shield (−3 mana) — extra action resolved before the round starts. Available only when you go second."><span class="g-ico">🛡️</span><span class="cost">−3💧</span></button>

  <div class="controls">
    <div class="actions">
      <!-- skupiny akcií — label so „zátvorkou" nad sekciou -->
      <div class="act-group" data-label="MOVE">
        <!-- Move — otvorí výber smeru -->
        <div class="move-wrap">
          <button id="move-btn" class="btn act move" title="Move — choose a direction">🚶</button>
          <div id="dir-picker" class="dir-picker hidden">
            <button class="btn arrow up"    data-act="move:up"    title="Move Up">↑</button>
            <button class="btn arrow left"  data-act="move:left"  title="Move Left">←</button>
            <button class="btn arrow right" data-act="move:right" title="Move Right">→</button>
            <button class="btn arrow down"  data-act="move:down"  title="Move Down">↓</button>
          </div>
        </div>

        <!-- Dash — presun až o 2 políčka zvoleným smerom -->
        <div class="move-wrap">
          <button id="dash-btn" class="btn act dash" title="Dash — move up to 2 cells in a direction (−4 mana)">🏃<span class="cost">−4💧</span></button>
          <div id="dash-picker" class="dir-picker hidden">
            <button class="btn arrow up"    data-act="dash:up"    title="Dash Up">↑</button>
            <button class="btn arrow left"  data-act="dash:left"  title="Dash Left">←</button>
            <button class="btn arrow right" data-act="dash:right" title="Dash Right">→</button>
            <button class="btn arrow down"  data-act="dash:down"  title="Dash Down">↓</button>
          </div>
        </div>
      </div>

      <div class="act-group" data-label="ATTACK">
        <!-- Attack — otvorí výber smeru streľby -->
        <div class="move-wrap">
          <button id="attack-btn" class="btn act attack" title="Range Attack — choose a direction (−2 mana, damage by distance: 3/2/1, can't hit your own cell)">🏹<span class="cost">−2💧 ?☠️</span></button>
          <div id="aim-picker" class="dir-picker hidden">
            <button class="btn arrow up"    data-act="attack:up"    title="Shoot Up">↑</button>
            <button class="btn arrow left"  data-act="attack:left"  title="Shoot Left">←</button>
            <button class="btn arrow right" data-act="attack:right" title="Shoot Right">→</button>
            <button class="btn arrow down"  data-act="attack:down"  title="Shoot Down">↓</button>
          </div>
        </div>
        <button class="btn act melee" data-act="melee" title="Melee (−4 mana, 8 dmg, hits only an opponent on your cell)">🗡️<span class="cost">−4💧 8☠️</span></button>
        <button id="special-btn" class="btn act special" data-act="special" title="Special (−5 mana)">✨<span class="cost">−5💧</span></button>
      </div>

      <div class="act-group" data-label="DEFEND">
        <button class="btn act shield" data-act="shield" title="Shield (−2 mana, blocks all damage of the opponent's next action)">🛡️<span class="cost">−2💧</span></button>
        <button class="btn act block" data-act="block" title="Block (−1 mana, reduces the opponent's next action damage by 1)">🧱<span class="cost">−1💧</span></button>
      </div>

      <div class="act-group" data-label="MANA">
        <button class="btn act mana" data-act="recharge" title="Recharge (+4 mana)">🙏<span class="cost">+4💧</span></button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="meta">
      <button id="undo" class="btn secondary" title="Undo — removes the last queued action">↩</button>
      <button id="lock" class="btn btn-lock">LOCK IN</button>
    </div>
  </div>

    <!-- Golden Mana Refill — samostatné tlačidlo napravo od panela, vykoná sa ako úplne posledná udalosť kola -->
    <button id="golden-mana-btn" class="btn act golden hidden" title="Golden Mana Refill (+6 mana for HP, cost grows each use) — extra action resolved after the round ends."><span class="g-ico">🙏</span><span class="cost" id="gm-cost">−1❤️ +6💧</span></button>
  </div>

  <!-- Character select -->
  <div id="char-select" class="char-select">
    <div class="char-card" data-char="fire">
      <canvas class="char-canvas" width="160" height="160" data-char="fire"></canvas>
      <div class="char-name">Fire Wizard</div>
    </div>
    <div class="char-card" data-char="lightning">
      <canvas class="char-canvas" width="160" height="160" data-char="lightning"></canvas>
      <div class="char-name">Lightning Mage</div>
    </div>
    <div class="char-card" data-char="wanderer">
      <canvas class="char-canvas" width="160" height="160" data-char="wanderer"></canvas>
      <div class="char-name">Wanderer Magician</div>
    </div>
  </div>

  <!-- Tretí a ďalší pripojený hráč — hra je plná, len informačná hláška -->
  <div id="spectator" class="spectator hidden">Momentálne prebieha hra…</div>

  <!-- Game over — verdikt sa píše do hud-turn, tu je len Play again v strede -->
  <div id="gameover" class="gameover hidden">
    <button id="retry" class="retry">Play again?</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js" type="module"></script>
</body>
</html>
