<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Luffy Gear3 — animovaný playground</title>
<style>
  :root { --bg:#12141c; --card:#1b1e2b; --line:#2c3142; --txt:#e6e8f0; --mut:#8b90a6; --accent:#ffcf3a;
          --cO:#57e08a; --cT:#ffb454; --cP:#ff6b6b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:13px/1.5 system-ui,Segoe UI,Roboto,sans-serif; }
  header { padding:10px 18px; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  h1 { font-size:15px; margin:0; } h1 b { color:var(--accent); }
  .wrap { display:flex; gap:20px; padding:16px 18px; align-items:flex-start; flex-wrap:wrap; }
  #boardWrap { position:relative; transform-origin:top left; }
  .board { position:relative; width:calc(4*260px + 3*10px); height:calc(3*185px + 2*10px);
           display:grid; grid-template-columns:repeat(4,260px); grid-template-rows:repeat(3,185px); gap:10px; }
  .cell { border:2px solid #333a4f; border-radius:8px; background:#191c27; }
  .cell:nth-child(odd){ background:#1d2130; }
  .cell.luffy { border-color:var(--accent); box-shadow:inset 0 0 0 2px rgba(255,207,58,.25); }
  .cell.foe { border-color:#ff6b6b; box-shadow:inset 0 0 0 2px rgba(255,107,107,.25); }
  #arm, #handles { position:absolute; left:0; top:0; pointer-events:none; z-index:5; image-rendering:pixelated; }
  #handles { z-index:10; pointer-events:auto; cursor:crosshair; image-rendering:auto; }
  #actor, #foe { position:absolute; pointer-events:none; }
  #actor { z-index:6; } #foe { z-index:6; }
  #actor canvas, #foe canvas { image-rendering:pixelated; }
  .panel { min-width:340px; max-width:420px; display:flex; flex-direction:column; gap:12px; }
  .grp { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .gl { color:var(--accent); font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .gl small { color:var(--mut); text-transform:none; letter-spacing:0; font-weight:normal; }
  .row { display:flex; align-items:center; gap:8px; margin:5px 0; }
  .row label { width:180px; color:var(--mut); font-size:12px; }
  .row input[type=range]{ flex:1; accent-color:var(--accent); }
  .row output { min-width:48px; text-align:right; font-variant-numeric:tabular-nums; }
  .btns { display:flex; flex-wrap:wrap; gap:6px; }
  button { background:#232838; color:var(--txt); border:1px solid var(--line); border-radius:7px; padding:6px 11px; cursor:pointer; font-size:13px; }
  button:hover { border-color:var(--accent); }
  button.on, button.play { border-color:var(--accent); background:#2a2410; color:var(--accent); }
  label.chk { display:flex; align-items:center; gap:6px; color:var(--mut); }
  pre { background:#0d0f16; border:1px solid var(--line); border-radius:8px; padding:10px; margin:0;
        color:#b7f7c9; font:12px/1.5 ui-monospace,Consolas,monospace; white-space:pre-wrap; }
  .nowp { color:var(--accent); font-size:12px; min-height:16px; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--mut); }
  .legend b { display:inline-block; width:12px; height:12px; border-radius:50%; vertical-align:-2px; margin-right:4px; }
  .tag-O b{background:var(--cO)} .tag-T b{background:var(--cT)} .tag-P b{background:var(--cP)}
  .sel { color:var(--accent); font-weight:600; }
  .hint { color:var(--mut); font-size:11px; margin-top:4px; }
</style>
</head>
<body>
<header>
  <h1><b>Luffy Gear3</b> — animovaný playground (geometria 1:1 s hrou)</h1>
  <button id="play" class="play">▶ Prehraj útok</button>
  <label class="chk"><input type="checkbox" id="loop"> loop</label>
  <div class="row" style="margin:0"><label style="width:auto">rýchlosť</label><input type="range" id="speed" min="0.2" max="2" step="0.1" value="1"><output id="speedv">1.0×</output></div>
  <label class="chk"><input type="checkbox" id="zoom" checked> zoom 60%</label>
  <label class="chk"><input type="checkbox" id="showH" checked> body (ťahaj myšou)</label>
  <div class="nowp" id="nowp"></div>
</header>

<div class="wrap">
  <div id="boardWrap">
    <div class="board" id="board"></div>
    <canvas id="arm"></canvas>
    <canvas id="handles"></canvas>
    <div id="foe"><canvas id="foeCv"></canvas></div>
    <div id="actor"><canvas id="actorCv"></canvas></div>
  </div>

  <div class="panel">
    <div class="grp">
      <div class="gl">Scéna</div>
      <div class="row"><label>Smer</label><div class="btns" id="dirBtns">
        <button class="on" data-dir="right">→</button><button data-dir="left">←</button>
        <button data-dir="up">↑</button><button data-dir="down">↓</button></div></div>
      <div class="row"><label>Vzdialenosť súpera</label><input type="range" id="dist" min="1" max="3" step="1" value="2"><output id="distv">2</output></div>
      <div class="row"><label>Náhľad (bez prehrávania)</label><div class="btns" id="prevBtns">
        <button data-ph="windup">windup</button><button class="on" data-ph="hold">reach</button><button data-ph="pull">pull</button></div></div>
      <div class="legend">
        <span class="tag-O"><b></b>O — napojenie na tele</span>
        <span class="tag-T"><b></b>T — koniec gumy</span>
        <span class="tag-P"><b></b>P — stred päste</span>
      </div>
      <div class="hint" id="selHint">Ťahaj body myšou. Klikni na bod → šípkami dolaď po 1&nbsp;px (Shift = 10&nbsp;px).</div>
    </div>
    <div id="sliderHost"></div>
    <div class="grp">
      <div class="gl">Súradnice <small>toto mi nadiktuj</small></div>
      <pre id="out"></pre>
    </div>
  </div>
</div>

<script>
// ── geometria 1:1 s hrou (client.js) ──────────────────────────────────────────
const TILE_W=260, TILE_H=185, GAP=10, ACTOR_SCALE=1.875;
const ACTOR_W=Math.round(TILE_W*ACTOR_SCALE), ACTOR_H=Math.round(TILE_H*ACTOR_SCALE);
const LUFFY_BOARD_FILL=0.58, LUFFY_FRAME_REF_H=128, LUFFY_BOARD_OFF_Y=4;
const LUFFY_GIANT_FIST={sx:182, sy:186, s:134};
const G="/assets/luffy/", BOARD_W=4, BOARD_H=3;

// ── konfig ────────────────────────────────────────────────────────────────────
// Každý bod je offset v ZLOMKOCH dlaždice v „smerovom" rámci:
//   x = pozdĺž útoku (dopredu k súperovi = +)   y = kolmo/výška (hore = záporné)
// O = napojenie gumy na Luffym (referencia = Luffyho bunka)
// T = koniec gumy   |   P = stred obrovskej päste   (referencia oboch = cieľová bunka)
// Defaulty = PRESNE aktuálne herné hodnoty (origin fwd 0.18 / up 0.06; tip+päsť = stred cieľa).
const CFG = {
  reach: { origin:{x:0.18,y:-0.06}, tip:{x:0.00,y:0.00}, fist:{x:0.00,y:0.00,size:0.95}, thick:20, crop:0.56 },
  pull:  { origin:{x:0.18,y:-0.06}, tip:{x:0.00,y:0.00}, fist:{x:0.00,y:0.00,size:0.70}, thick:11, crop:0.50 },
};
// časovanie fáz (ms, pred rýchlosťou)
const T = { windup:600, stretch:480, hold:600, evalp:200, pull:600, done:400 };

// ── loader ────────────────────────────────────────────────────────────────────
const cache=new Map();
function load(file){
  if(cache.has(file)) return cache.get(file);
  const img=new Image(); img.src=G+file;
  const rec={img,ready:false,frames:1,fw:1,fh:1};
  img.onload=()=>{ rec.ready=true; rec.fh=img.height; rec.frames=Math.max(1,Math.round(img.width/img.height)); rec.fw=img.width/rec.frames; };
  cache.set(file,rec); return rec;
}
const S={ rocket:load("L_GiantRocket.png"), punch:load("L_GiantPunch.png"), rpull:load("L_RocketPull.png"),
          idle:load("Idle.png"), giant:load("L_GiantPunch.png"), fist:load("L_Fist.png"), foe:load("Idle.png") };

// ── plocha ──────────────────────────────────────────────────────────────────
const boardEl=document.getElementById("board"), cells=[];
for(let y=0;y<BOARD_H;y++) for(let x=0;x<BOARD_W;x++){ const c=document.createElement("div"); c.className="cell"; c.dataset.x=x; c.dataset.y=y; boardEl.appendChild(c); cells.push(c); }
const armCv=document.getElementById("arm"), armCtx=armCv.getContext("2d");
const hCv=document.getElementById("handles"), hCtx=hCv.getContext("2d");
const W=BOARD_W*TILE_W+(BOARD_W-1)*GAP, H=BOARD_H*TILE_H+(BOARD_H-1)*GAP;
armCv.width=W; armCv.height=H; hCv.width=W; hCv.height=H;
const actorEl=document.getElementById("actor"), actorCv=document.getElementById("actorCv"), actorCtx=actorCv.getContext("2d");
const foeEl=document.getElementById("foe"), foeCv=document.getElementById("foeCv"), foeCtx=foeCv.getContext("2d");
actorCv.width=ACTOR_W; actorCv.height=ACTOR_H; foeCv.width=ACTOR_W; foeCv.height=ACTOR_H;

const LUFFY={x:1,y:1};
const DIRV={ right:[1,0], left:[-1,0], up:[0,-1], down:[0,1] };
let dir="right", dist=2, speed=1, loopOn=false, previewPhase="hold", showH=true;

function cellLeft(x){ return x*(TILE_W+GAP); } function cellTop(y){ return y*(TILE_H+GAP); }
function cellCenter(x,y){ return [cellLeft(x)+TILE_W/2, cellTop(y)+TILE_H/2]; }
function foeCell(){ const d=DIRV[dir]; let fx=LUFFY.x+d[0]*dist, fy=LUFFY.y+d[1]*dist;
  return [Math.max(0,Math.min(BOARD_W-1,fx)), Math.max(0,Math.min(BOARD_H-1,fy))]; }

// ── smerový rámec: (along,perp) ⟷ (screenX,screenY) ────────────────────────────
function rot(d,a,b){                 // zlomky → px delta
  if(d[0]>0) return [a*TILE_W,  b*TILE_H];
  if(d[0]<0) return [-a*TILE_W, b*TILE_H];
  if(d[1]>0) return [b*TILE_W,  a*TILE_H];
  return          [b*TILE_W, -a*TILE_H];   // up
}
function unrot(d,sx,sy){             // px delta → zlomky [along,perp]
  if(d[0]>0) return [sx/TILE_W,  sy/TILE_H];
  if(d[0]<0) return [-sx/TILE_W, sy/TILE_H];
  if(d[1]>0) return [sy/TILE_H,  sx/TILE_W];
  return          [-sy/TILE_H, sx/TILE_W];  // up
}

// ── kresli telo (kópia drawSprite pre Luffyho) ─────────────────────────────────
function drawBody(rec, frameIdx, cropRightFrac, flipLeft){
  actorCtx.clearRect(0,0,ACTOR_W,ACTOR_H);
  if(!rec.ready) return;
  const fw=rec.fw, fh=rec.fh;
  const fill=LUFFY_BOARD_FILL*(fh/LUFFY_FRAME_REF_H);
  const scale=Math.min(ACTOR_W/fw, ACTOR_H/fh)*fill;
  const cropRPx=Math.round(fw*Math.max(0,Math.min(0.9,cropRightFrac||0)));
  const sx=Math.min(frameIdx,rec.frames-1)*fw, sw=Math.max(1, fw-cropRPx);
  const dw=sw*scale, dh=fh*scale, dx=(ACTOR_W-dw)/2, dy=(ACTOR_H-dh)*1 + LUFFY_BOARD_OFF_Y;
  actorCtx.imageSmoothingEnabled=false;
  actorCtx.drawImage(rec.img, sx,0, sw,fh, dx,dy, dw,dh);
  const px=cellLeft(LUFFY.x)-(ACTOR_W-TILE_W)/2, py=cellTop(LUFFY.y)-(ACTOR_H-TILE_H);
  actorEl.style.left=px+"px"; actorEl.style.top=py+"px";
  actorEl.style.transform = flipLeft ? "scaleX(-1)" : "scaleX(1)";
}
function drawFoeAt(fxc,fyc,flipLeft){
  const r=S.foe; if(!r.ready) return;
  const fill=LUFFY_BOARD_FILL*(r.fh/LUFFY_FRAME_REF_H), s=Math.min(ACTOR_W/r.fw,ACTOR_H/r.fh)*fill;
  const dw=r.fw*s, dh=r.fh*s; foeCtx.clearRect(0,0,ACTOR_W,ACTOR_H); foeCtx.imageSmoothingEnabled=false;
  foeCtx.drawImage(r.img,0,0,r.fw,r.fh,(ACTOR_W-dw)/2,(ACTOR_H-dh)+LUFFY_BOARD_OFF_Y,dw,dh);
  const px=fxc*(TILE_W+GAP)-(ACTOR_W-TILE_W)/2, py=fyc*(TILE_H+GAP)-(ACTOR_H-TILE_H);
  foeEl.style.left=px+"px"; foeEl.style.top=py+"px"; foeEl.style.transform=flipLeft?"scaleX(-1)":"scaleX(1)";
}

// ── kresli päsť (kópia orient() z luffyArmFrame) ───────────────────────────────
function drawFist(rec, sx,sy,sw,sh, cx,cy, d, size){
  if(!rec.ready) return;
  armCtx.save(); armCtx.imageSmoothingEnabled=false; armCtx.translate(cx,cy);
  if(d[0]<0) armCtx.scale(-1,1); else if(d[1]>0) armCtx.rotate(Math.PI/2); else if(d[1]<0) armCtx.rotate(-Math.PI/2);
  armCtx.drawImage(rec.img, sx,sy,sw,sh, -size/2,-size/2, size,size); armCtx.restore();
}

// vypočíta 3 body v px pre daný cfg/smer/referencie (pri armP=1)
function armPoints(cfg,d,originRef,targetRef){
  const o=rot(d,cfg.origin.x,cfg.origin.y), t=rot(d,cfg.tip.x,cfg.tip.y), f=rot(d,cfg.fist.x,cfg.fist.y);
  return { O:[originRef[0]+o[0], originRef[1]+o[1]],
           T:[targetRef[0]+t[0], targetRef[1]+t[1]],
           P:[targetRef[0]+f[0], targetRef[1]+f[1]] };
}
// nakreslí gumu + päsť; armP interpoluje naťahovanie od O. Vráti aktuálne px body (pre úchopy).
let lastHandles=null; // {O,T,P, cfgKey, d, originRef, targetRef}
function drawArm(cfg, d, fistKind, armP, originRef, targetRef, cfgKey){
  const {O,T,P}=armPoints(cfg,d,originRef,targetRef);
  const Tc=[O[0]+(T[0]-O[0])*armP, O[1]+(T[1]-O[1])*armP];
  const Pc=[O[0]+(P[0]-O[0])*armP, O[1]+(P[1]-O[1])*armP];
  armCtx.save(); armCtx.lineCap="round";
  armCtx.strokeStyle="#d9a765"; armCtx.lineWidth=cfg.thick;      armCtx.beginPath(); armCtx.moveTo(O[0],O[1]); armCtx.lineTo(Tc[0],Tc[1]); armCtx.stroke();
  armCtx.strokeStyle="#f2cf9b"; armCtx.lineWidth=cfg.thick*0.45; armCtx.beginPath(); armCtx.moveTo(O[0],O[1]); armCtx.lineTo(Tc[0],Tc[1]); armCtx.stroke();
  armCtx.restore();
  if(fistKind==="giant") drawFist(S.giant, LUFFY_GIANT_FIST.sx,LUFFY_GIANT_FIST.sy,LUFFY_GIANT_FIST.s,LUFFY_GIANT_FIST.s, Pc[0],Pc[1], d, TILE_H*cfg.fist.size);
  else drawFist(S.fist, 1*S.fist.fw,0,S.fist.fw,S.fist.fh, Pc[0],Pc[1], d, TILE_H*cfg.fist.size);
  if(armP>=1 && cfgKey){ lastHandles={O,T,P,cfgKey,d,originRef,targetRef}; }
}

// ── úchopové body (drag) ───────────────────────────────────────────────────────
const HDEF=[ {k:"O",col:getComputedStyle(document.documentElement).getPropertyValue("--cO"),pt:"origin",ref:"origin"},
             {k:"T",col:getComputedStyle(document.documentElement).getPropertyValue("--cT"),pt:"tip",   ref:"target"},
             {k:"P",col:getComputedStyle(document.documentElement).getPropertyValue("--cP"),pt:"fist",  ref:"target"} ];
let selHandle=null;
function drawHandles(){
  hCtx.clearRect(0,0,W,H);
  if(!showH || !lastHandles) return;
  const {O,T,P}=lastHandles;
  const pos={O,T,P};
  hCtx.save();
  HDEF.forEach(h=>{
    const p=pos[h.k]; if(!p) return;
    const r=selHandle===h.k?15:11;
    hCtx.beginPath(); hCtx.arc(p[0],p[1],r,0,7);
    hCtx.fillStyle=h.col.trim()+"cc"; hCtx.fill();
    hCtx.lineWidth=selHandle===h.k?4:2; hCtx.strokeStyle="#0d0f16"; hCtx.stroke();
    hCtx.fillStyle="#0d0f16"; hCtx.font="bold 15px system-ui"; hCtx.textAlign="center"; hCtx.textBaseline="middle";
    hCtx.fillText(h.k, p[0], p[1]+1);
  });
  hCtx.restore();
}
function evtToCanvas(e){
  const r=hCv.getBoundingClientRect();
  return [ (e.clientX-r.left)*(hCv.width/r.width), (e.clientY-r.top)*(hCv.height/r.height) ];
}
function hitHandle(px,py){
  if(!lastHandles) return null;
  const pos={O:lastHandles.O,T:lastHandles.T,P:lastHandles.P};
  let best=null,bd=1e9;
  HDEF.forEach(h=>{ const p=pos[h.k]; if(!p) return; const dd=Math.hypot(px-p[0],py-p[1]); if(dd<24&&dd<bd){bd=dd;best=h.k;} });
  return best;
}
function applyHandleTo(k, px, py){
  if(!lastHandles) return;
  const {cfgKey,d,originRef,targetRef}=lastHandles;
  const cfg=CFG[cfgKey];
  const def=HDEF.find(h=>h.k===k);
  const ref = def.ref==="origin" ? originRef : targetRef;
  const [a,b]=unrot(d, px-ref[0], py-ref[1]);
  cfg[def.pt].x=a; cfg[def.pt].y=b;
  syncSliders(); updateOut();
}
let dragging=null;
hCv.addEventListener("pointerdown", e=>{
  if(anim) return; const [px,py]=evtToCanvas(e); const k=hitHandle(px,py);
  if(k){ dragging=k; selHandle=k; hCv.setPointerCapture(e.pointerId); updateSelHint(); }
});
hCv.addEventListener("pointermove", e=>{ if(!dragging) return; const [px,py]=evtToCanvas(e); applyHandleTo(dragging,px,py); });
hCv.addEventListener("pointerup",   e=>{ dragging=null; });
window.addEventListener("keydown", e=>{
  if(!selHandle || anim || !lastHandles) return;
  const step=(e.shiftKey?10:1); let dx=0,dy=0;
  if(e.key==="ArrowLeft")dx=-step; else if(e.key==="ArrowRight")dx=step; else if(e.key==="ArrowUp")dy=-step; else if(e.key==="ArrowDown")dy=step; else return;
  e.preventDefault();
  const pos={O:lastHandles.O,T:lastHandles.T,P:lastHandles.P}[selHandle];
  applyHandleTo(selHandle, pos[0]+dx, pos[1]+dy);
});
function updateSelHint(){
  const el=document.getElementById("selHint");
  if(selHandle){ const n={O:"O — napojenie na tele",T:"T — koniec gumy",P:"P — stred päste"}[selHandle];
    el.innerHTML=`Vybraté: <span class="sel">${n}</span> — šípkami dolaď po 1&nbsp;px (Shift = 10&nbsp;px).`; }
  else el.innerHTML="Ťahaj body myšou. Klikni na bod → šípkami dolaď po 1&nbsp;px (Shift = 10&nbsp;px).";
}

// ── prehrávanie ────────────────────────────────────────────────────────────────
let anim=null; // {i,t0}
const SEQ=["windup","stretch","hold","evalp","pull","done"];
function play(){ anim={ i:0, t0:performance.now() }; selHandle=null; updateSelHint(); }
function frameOf(rec, prog){ return Math.min(rec.frames-1, Math.floor(prog*rec.frames)); }

function render(now){
  const d=DIRV[dir]; const flip=d[0]<0;
  const [fx,fy]=foeCell();
  const foeAdj=[LUFFY.x+d[0], LUFFY.y+d[1]];
  cells.forEach(c=>{ c.classList.remove("luffy","foe");
    if(+c.dataset.x===LUFFY.x&&+c.dataset.y===LUFFY.y) c.classList.add("luffy");
    if(+c.dataset.x===fx&&+c.dataset.y===fy) c.classList.add("foe"); });
  armCtx.clearRect(0,0,W,H);
  lastHandles=null;
  const oRef=cellCenter(LUFFY.x,LUFFY.y);
  const tip=cellCenter(fx,fy);

  if(!anim){ // STATICKÝ náhľad zvolenej fázy
    document.getElementById("nowp").textContent="";
    drawFoeAt(fx,fy, fx>=LUFFY.x);
    if(previewPhase==="windup"){ drawBody(S.rocket, S.rocket.frames-1, 0, flip); }
    else if(previewPhase==="pull"){ drawBody(S.rpull, S.rpull.frames-1, CFG.pull.crop, flip); drawArm(CFG.pull,d,"grip",1, oRef, cellCenter(foeAdj[0],foeAdj[1]), "pull"); }
    else { drawBody(S.punch, S.punch.frames-1, CFG.reach.crop, flip); drawArm(CFG.reach,d,"giant",1, oRef, tip, "reach"); }
    drawHandles();
    requestAnimationFrame(render); return;
  }

  // ANIMÁCIA
  const ph=SEQ[anim.i]; const dur=T[ph]/speed; const e=now-anim.t0; const prog=Math.min(1,e/dur);
  document.getElementById("nowp").textContent="▶ "+ph;
  if(ph==="pull"){ const fxc=fx+(foeAdj[0]-fx)*prog, fyc=fy+(foeAdj[1]-fy)*prog; drawFoeAt(fxc,fyc, foeAdj[0]>=LUFFY.x); }
  else if(ph==="done"){ drawFoeAt(foeAdj[0],foeAdj[1], foeAdj[0]>=LUFFY.x); }
  else drawFoeAt(fx,fy, fx>=LUFFY.x);

  if(ph==="windup"){ drawBody(S.rocket, frameOf(S.rocket,prog), 0, flip); }
  else if(ph==="stretch"){ drawBody(S.punch, frameOf(S.punch,prog), CFG.reach.crop, flip); drawArm(CFG.reach,d,"giant", 1-Math.pow(1-prog,3), oRef, tip); }
  else if(ph==="hold"||ph==="evalp"){ drawBody(S.punch, S.punch.frames-1, CFG.reach.crop, flip); drawArm(CFG.reach,d,"giant",1, oRef, tip); }
  else if(ph==="pull"){ drawBody(S.rpull, frameOf(S.rpull,prog), CFG.pull.crop, flip);
    const cur=[fx+(foeAdj[0]-fx)*prog, fy+(foeAdj[1]-fy)*prog]; drawArm(CFG.pull,d,"grip",1, oRef, cellCenter(cur[0],cur[1])); }
  else if(ph==="done"){ drawBody(S.idle, frameOf(S.idle,(e/300)%1), 0, flip); }
  drawHandles();

  if(prog>=1){ anim.i++; anim.t0=now;
    if(anim.i>=SEQ.length){ anim=null; if(loopOn) play(); } }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── slidery (generované) ────────────────────────────────────────────────────────
const FIELDS=[
  {p:"origin.x", lab:"O · dopredu (→)",       min:-0.50,max:1.00,step:0.01},
  {p:"origin.y", lab:"O · výška (hore = −)",  min:-0.80,max:0.60,step:0.01},
  {p:"tip.x",    lab:"T · dopredu (→)",       min:-1.00,max:1.20,step:0.01},
  {p:"tip.y",    lab:"T · výška (hore = −)",  min:-0.80,max:0.80,step:0.01},
  {p:"fist.x",   lab:"P · dopredu (→)",       min:-1.00,max:1.20,step:0.01},
  {p:"fist.y",   lab:"P · výška (hore = −)",  min:-0.80,max:0.80,step:0.01},
  {p:"fist.size",lab:"P · veľkosť (×TILE_H)", min:0.30,max:1.60,step:0.01},
  {p:"thick",    lab:"guma · hrúbka (px)",    min:2,   max:40,  step:1},
  {p:"crop",     lab:"telo · orez ruky",      min:0,   max:0.85,step:0.01},
];
function gp(o,path){ return path.split(".").reduce((a,k)=>a[k],o); }
function sp(o,path,v){ const ks=path.split("."), last=ks.pop(); ks.reduce((a,k)=>a[k],o)[last]=v; }
const host=document.getElementById("sliderHost");
const sliderMap={reach:{},pull:{}};
function buildGroup(key,title){
  const g=document.createElement("div"); g.className="grp";
  g.innerHTML=`<div class="gl">${title}</div>`;
  FIELDS.forEach(fd=>{
    const row=document.createElement("div"); row.className="row";
    const v=gp(CFG[key],fd.p);
    row.innerHTML=`<label>${fd.lab}</label><input type="range" min="${fd.min}" max="${fd.max}" step="${fd.step}" value="${v}"><output>${(+v).toFixed(2)}</output>`;
    const inp=row.querySelector("input"), out=row.querySelector("output");
    inp.oninput=()=>{ const nv=parseFloat(inp.value); sp(CFG[key],fd.p,nv); out.textContent=nv.toFixed(2); updateOut(); };
    sliderMap[key][fd.p]={inp,out};
    g.appendChild(row);
  });
  host.appendChild(g);
}
buildGroup("reach","REACH — natiahnutie (giant päsť)");
buildGroup("pull","PULL — priťiahnutie (grip päsť)");
function syncSliders(){
  ["reach","pull"].forEach(key=>FIELDS.forEach(fd=>{
    const m=sliderMap[key][fd.p]; if(!m) return; const v=gp(CFG[key],fd.p);
    m.inp.value=v; m.out.textContent=(+v).toFixed(2);
  }));
}

function updateOut(){
  const f=n=>(+n).toFixed(3);
  const c=CFG;
  document.getElementById("out").textContent =
`// zlomky dlaždice (x=dopredu, y=výška, hore=−)
LUFFY_ARM = {
  reach: { O:{x:${f(c.reach.origin.x)}, y:${f(c.reach.origin.y)}},
           T:{x:${f(c.reach.tip.x)}, y:${f(c.reach.tip.y)}},
           P:{x:${f(c.reach.fist.x)}, y:${f(c.reach.fist.y)}, size:${f(c.reach.fist.size)}},
           thick:${c.reach.thick}, crop:${f(c.reach.crop)} },
  pull:  { O:{x:${f(c.pull.origin.x)}, y:${f(c.pull.origin.y)}},
           T:{x:${f(c.pull.tip.x)}, y:${f(c.pull.tip.y)}},
           P:{x:${f(c.pull.fist.x)}, y:${f(c.pull.fist.y)}, size:${f(c.pull.fist.size)}},
           thick:${c.pull.thick}, crop:${f(c.pull.crop)} },
};`;
}
updateOut();

// ── ovládanie ────────────────────────────────────────────────────────────────
document.getElementById("play").onclick=play;
document.getElementById("loop").onchange=e=>loopOn=e.target.checked;
document.getElementById("speed").oninput=e=>{ speed=+e.target.value; document.getElementById("speedv").textContent=speed.toFixed(1)+"×"; };
document.getElementById("dist").oninput=e=>{ dist=+e.target.value; document.getElementById("distv").textContent=dist; };
document.getElementById("showH").onchange=e=>{ showH=e.target.checked; };
document.querySelectorAll("#dirBtns button").forEach(b=>b.onclick=()=>{ dir=b.dataset.dir;
  document.querySelectorAll("#dirBtns button").forEach(x=>x.classList.toggle("on",x===b)); });
document.querySelectorAll("#prevBtns button").forEach(b=>b.onclick=()=>{ previewPhase=b.dataset.ph; selHandle=null; updateSelHint();
  document.querySelectorAll("#prevBtns button").forEach(x=>x.classList.toggle("on",x===b)); });
const zoomEl=document.getElementById("zoom"), bw=document.getElementById("boardWrap");
function applyZoom(){ bw.style.transform = zoomEl.checked ? "scale(0.6)" : "scale(1)"; }
zoomEl.onchange=applyZoom; applyZoom();
</script>
